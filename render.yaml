services:
  - type: web
    name: detailflow
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production PORT=10000 node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
